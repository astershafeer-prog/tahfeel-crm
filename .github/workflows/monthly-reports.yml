name: Monthly Compliance Reports

on:
  schedule:
    - cron: '0 5 1 * *'   # 09:00 Dubai (UTC+4) = 05:00 UTC, on the 1st of every month
  workflow_dispatch: {}    # allows manual run from the Actions tab

jobs:
  reports:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly compliance report emails
        run: |
          echo "Calling monthly-reports endpoint..."
          curl -fsS "https://tahfeelcrm.online/cron/monthly-reports?key=${{ secrets.CRON_KEY }}" -o response.json \
            || { echo "Request failed"; exit 1; }
          echo "Response:"; cat response.json
