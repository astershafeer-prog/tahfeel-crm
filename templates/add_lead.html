<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahfeel CRM — Add Lead</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; }
    .topbar { background: #133E87; color: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
    .topbar h1 { font-size: 18px; font-weight: 700; }
    .topbar a { color: #DCDCBF; text-decoration: none; font-size: 13px; }
    .nav { background: #1E5AB8; padding: 0 24px; display: flex; gap: 4px; }
    .nav a { color: #c8d8f0; text-decoration: none; padding: 10px 16px; font-size: 13px; border-bottom: 3px solid transparent; }
    .nav a:hover, .nav a.active { color: white; border-bottom-color: #DCDCBF; }
    .container { padding: 24px; max-width: 800px; margin: 0 auto; }
    .card { background: white; border-radius: 10px; border: 0.5px solid #ddd; padding: 28px; }
    .card h2 { font-size: 16px; color: #133E87; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #133E87; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group.full { grid-column: 1 / -1; }
    label { display: block; font-size: 12px; color: #555; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
    label .req { color: #c0392b; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif; outline: none; background: white; }
    input:focus, select:focus, textarea:focus { border-color: #133E87; }
    textarea { resize: vertical; min-height: 80px; }
    .section-title { font-size: 13px; font-weight: 700; color: #133E87; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; grid-column: 1 / -1; }
    .actions { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
    .btn-primary { background: #133E87; color: white; padding: 11px 28px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #1E5AB8; }
    .btn-cancel { padding: 11px 24px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #555; text-decoration: none; background: white; }
    .btn-cancel:hover { border-color: #133E87; color: #133E87; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Tahfeel Business Solutions — CRM</h1>
    <a href="/logout">Logout</a>
  </div>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/leads">All Leads</a>
    <a href="/leads/add" class="active">Add Lead</a>
    <a href="/leads/import">Import Leads</a>
    {% if session.role == 'admin' %}<a href="/users">Manage Staff</a>{% endif %}
  </div>
  <div class="container">
    <div class="card">
      <h2>New Lead Entry</h2>
      <form method="POST">
        <div class="grid-2">
          <div class="section-title">Customer Information</div>
          <div class="form-group">
            <label>Full Name <span class="req">*</span></label>
            <input type="text" name="name" required placeholder="Customer full name">
          </div>
          <div class="form-group">
            <label>Company</label>
            <input type="text" name="company" placeholder="Company or business name">
          </div>
          <div class="form-group">
            <label>Phone <span class="req">*</span></label>
            <input type="text" name="phone" required placeholder="+971 50 000 0000">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="email@example.com">
          </div>
          <div class="form-group full">
            <label>Address</label>
            <input type="text" name="address" placeholder="Dubai, UAE">
          </div>
          <div class="section-title">Lead Details</div>
          <div class="form-group">
            <label>Service Enquired <span class="req">*</span></label>
            <select name="service" required>
              <option value="">— Select service —</option>
              <option>Trade License</option>
              <option>Family Visa</option>
              <option>PRO Services</option>
              <option>Healthcare License</option>
              <option>Umrah Package</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Source</label>
            <select name="source">
              <option value="">— Select source —</option>
              <option>Walk-in</option>
              <option>WhatsApp</option>
              <option>Referral</option>
              <option>Social Media</option>
              <option>Website</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Assign To</label>
            <select name="assigned_to">
              <option value="">— Select staff —</option>
              {% for user in users %}
              <option value="{{ user.id }}">{{ user.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Due Date & Time</label>
            <input type="date" name="due_date">
          </div>
          <div class="form-group full">
            <label>Lead Type</label>
            <div style="display:flex;gap:8px;margin-top:4px;">
              <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;font-size:14px;">
                <input type="radio" name="lead_type" value="New" checked style="width:auto;"> New Lead
              </label>
              <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;font-size:14px;">
                <input type="radio" name="lead_type" value="Old Follow-up" style="width:auto;"> Old Follow-up
              </label>
            </div>
          </div>
          <div class="form-group full">
            <label>Remarks</label>
            <textarea name="remarks" placeholder="Any initial notes about this lead..."></textarea>
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="btn-primary">Save Lead</button>
          <a href="/dashboard" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
