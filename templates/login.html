<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahfeel CRM — Login</title>
  <link rel="stylesheet" href="/static/css/tahfeel.css">
  <link rel="icon" href="/static/img/logo_transparent.png" type="image/png">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F2660 0%, #1A3B8B 50%, #2D55B8 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 500px; height: 500px;
      background: rgba(255,255,255,.04);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 400px; height: 400px;
      background: rgba(255,255,255,.03);
      border-radius: 50%;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: fadeInUp .3s ease;
      position: relative;
      z-index: 1;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo img {
      height: 52px;
      width: auto;
      object-fit: contain;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #1A2333;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -.3px;
    }
    .login-sub {
      font-size: 13px;
      color: #8896A8;
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #4A5568;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      font-size: 14px;
      transition: all .15s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #1A3B8B;
      box-shadow: 0 0 0 3px rgba(26,59,139,.1);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1A3B8B, #2D55B8);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .2px;
      margin-top: 8px;
    }
    .btn-login:hover {
      box-shadow: 0 6px 20px rgba(26,59,139,.35);
      transform: translateY(-1px);
    }
    .error-msg {
      background: #FDEAEA;
      color: #B02020;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid #F5BABA;
    }
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #B8C4D0;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/static/img/logo_color.jpg" alt="Tahfeel Business Solutions" style="height:52px;width:auto;object-fit:contain;">
    </div>
    <div class="login-title">Welcome Back</div>
    <div class="login-sub">Sign in to your CRM account</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}<div class="error-msg">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
    <div class="login-footer">Tahfeel Business Solutions © 2026</div>
  </div>
</body>
</html>
