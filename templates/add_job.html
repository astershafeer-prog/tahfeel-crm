<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahfeel CRM — Add Task</title>
    <link rel="stylesheet" href="/static/css/tahfeel.css">
  <link rel="icon" href="/static/img/logo_transparent.png" type="image/png">
</head>
<body>
    {%- from 'macros.html' import topbar, nav, welcome -%}
  {{ topbar() }}
  {{ nav('jobs') }}
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}

    <form method="post">
      <!-- Main Task -->
      <div class="card">
        <h2>Add New Task</h2>

        <div class="form-group">
          <label>Customer *</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <select name="customer_id" required style="flex:1;">
              <option value="">— Select customer —</option>
              {% for c in customers %}
              <option value="{{ c.id }}" {% if request.args.get('customer_id') == c.id|string %}selected{% endif %}>{{ c.name }}{% if c.company %} — {{ c.company }}{% endif %}</option>
              {% endfor %}
            </select>
            <a href="/customers/add" style="background:white;border:1px solid #133E87;color:#133E87;padding:9px 14px;border-radius:8px;font-size:12px;text-decoration:none;white-space:nowrap;font-weight:600;">+ New Customer</a>
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label>Service Type *</label>
            <select name="job_type" required id="main-service-type">
              <option value="">— Select Service Type —</option>
              {% for jt in job_types %}
              <option value="{{ jt.name }}">{{ jt.name }}</option>
              {% endfor %}
              {% if not job_types %}<option disabled>No types yet — add in Admin Panel</option>{% endif %}
            </select>
          </div>
          <div class="form-group">
            <label>Assigned To</label>
            <select name="assigned_to" id="main-assigned">
              <option value="">— Select staff —</option>
              {% for u in users %}
              <option value="{{ u.id }}">{{ u.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row-4">
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" name="due_date">
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select name="priority">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label>Invoice Amount (AED)</label>
            <input type="number" name="amount_invoiced" placeholder="0" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>No. of Persons</label>
            <input type="number" name="num_persons" value="1" min="1" max="99">
          </div>
        </div>

        <div class="form-group">
          <label>Internal Notes</label>
          <textarea name="internal_notes" placeholder="Context, special instructions..."></textarea>
        </div>
      </div>

      <div class="form-actions">
          <button type="submit" class="btn-submit">Create Task</button>
          <a href="/jobs" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
